<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carlow Intensity Index Analysis</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b11;
      --surface: #111827;
      --surface-strong: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.18);
      --accent: #7da7ff;
      --accent-soft: rgba(125, 167, 255, 0.12);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #1a3a52cc 100%);
      color: var(--text);
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    header {
      display: grid;
      gap: 8px;
      margin-bottom: 36px;
    }
    header h1 {
      margin: 0;
      font-size: clamp(2rem, 2.6vw, 3rem);
      letter-spacing: -0.04em;
      font-weight: 700;
    }
    header .subtitle {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      width: fit-content;
    }
    .cards {
      display: grid;
      gap: 28px;
      margin-bottom: 32px;
    }
    .chart-card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.22);
      padding: 32px;
      overflow: hidden;
    }
    .chart-card h2 {
      margin: 0 0 18px;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .chart-container {
      position: relative;
      padding-top: 24px;
    }
    .chart-shell {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    canvas {
      width: 100% !important;
      max-height: 340px;
      border-radius: 16px;
      background: transparent;
      display: block;
    }
    .ht-marker {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 100%;
      width: 2px;
      background: rgba(125, 167, 255, 0.45);
      pointer-events: none;
    }
    .ht-label {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .meta-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .data-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.95rem;
      min-width: 180px;
    }
    .data-pill strong {
      font-weight: 700;
      color: var(--accent-soft);
    }
    .summary-cards {
      display: none;
    }
    .summary-card,
    .summary-stat {
      display: none;
    }
  </style>
</head>
<body>
  <article class="page">
    <header>
      <h1>Carlow Intensity Index Analysis</h1>
      <p class="subtitle">NHL 1B • Dr. Cullen Park • 2026 Home Games</p>
    </header>

    <section class="cards">
      <section class="chart-card">
        <h2>Round 1 • Down</h2>
        <div class="chart-container">
          <div class="ht-label">HT</div>
          <div class="ht-marker"></div>
          <div class="chart-shell"><canvas id="chartDown"></canvas></div>
        </div>
        <div class="meta-pills">
          <span class="data-pill"><strong>Intensity</strong> 5.2 – 4.8</span>
          <span class="data-pill"><strong>Opp poss</strong> 9:44</span>
          <span class="data-pill"><strong>Key actions</strong> 44</span>
        </div>
      </section>

      <section class="chart-card">
        <h2>Round 5 • Clare</h2>
        <div class="chart-container">
          <div class="ht-label">HT</div>
          <div class="ht-marker"></div>
          <div class="chart-shell"><canvas id="chartClare"></canvas></div>
        </div>
        <div class="meta-pills">
          <span class="data-pill"><strong>Intensity</strong> 2.8 – 2.8</span>
          <span class="data-pill"><strong>Opp poss</strong> 11:53</span>
          <span class="data-pill"><strong>Key actions</strong> 33</span>
        </div>
      </section>

      <section class="chart-card">
        <h2>Round 7 • Dublin</h2>
        <div class="chart-container">
          <div class="ht-label">HT</div>
          <div class="ht-marker"></div>
          <div class="chart-shell"><canvas id="chartDublin"></canvas></div>
        </div>
        <div class="meta-pills">
          <span class="data-pill"><strong>Intensity</strong> 3.4 – 3.5</span>
          <span class="data-pill"><strong>Opp poss</strong> 14:57</span>
          <span class="data-pill"><strong>Key actions</strong> 52</span>
        </div>
      </section>
    </section>
  </article>

  <script>
    const chartOptions = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          mode: 'nearest',
          intersect: false,
          backgroundColor: 'rgba(17, 24, 39, 0.92)',
          titleColor: '#fff',
          bodyColor: '#fff',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            label: function(context) {
              return `Intensity: ${context.formattedValue}`;
            }
          }
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: 'Time (minutes)',
            color: 'rgba(148, 163, 184, 0.8)',
            font: { size: 13, weight: '600' }
          },
          grid: { color: 'rgba(148, 163, 184, 0.12)' },
          ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--muted') }
        },
        y: {
          title: {
            display: true,
            text: 'Intensity Index',
            color: 'rgba(148, 163, 184, 0.8)',
            font: { size: 13, weight: '600' }
          },
          beginAtZero: false,
          suggestedMin: 2.2,
          suggestedMax: 5.8,
          grid: { color: 'rgba(148, 163, 184, 0.12)' },
          ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--muted') }
        }
      }
    };

    const defaultLabels = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70];
    const downData = [5.2, 5.7, 5.1, 5.2, 4.8, 4.7, 5.4, 5.7, 5.5, 5.5, 5.2, 5.2, 5.0, 4.8];
    const clareData = [2.8, 2.7, 4.0, 4.2, 3.9, 2.9, 3.1, 3.1, 3.2, 3.2, 3.1, 3.0, 2.9, 2.8];
    const dublinData = [3.4, 2.8, 2.9, 3.0, 2.6, 2.8, 2.8, 3.2, 3.2, 3.2, 3.4, 3.5, 3.5, 3.5];

    const createChart = (ctx, label, data, color) => {
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels: defaultLabels,
          datasets: [{
            label,
            data,
            borderColor: color,
            backgroundColor: color,
            fill: false,
            tension: 0.42,
            borderWidth: 3,
            pointRadius: 5,
            pointHoverRadius: 7,
            pointBackgroundColor: '#fff',
            pointBorderColor: color,
            pointBorderWidth: 2,
            segment: {
              borderColor: ctx => color
            }
          }]
        },
        options: chartOptions
      });
    };

    createChart(document.getElementById('chartDown'), 'Down', downData, 'rgb(31, 120, 255)');
    createChart(document.getElementById('chartClare'), 'Clare', clareData, 'rgb(16, 185, 129)');
    createChart(document.getElementById('chartDublin'), 'Dublin', dublinData, 'rgb(234, 88, 12)');
  </script>
</body>
</html>
